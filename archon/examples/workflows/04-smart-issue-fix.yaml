# .archon/workflows/smart-issue-fix.yaml
# Demonstrates ALL 7 node types in a single workflow:
# bash, script, prompt, command, loop, approval, cancel
# Plus: structured output, when:/conditional branching,
# trigger_rule: one_success, context: fresh, model: haiku
#
# Run with:
#   claude → "Use archon to run smart-issue-fix 'Fix issue #42'"

name: smart-issue-fix
description: |
  Fetch a GitHub issue, classify it, extract labels,
  route to appropriate handler, implement, and create PR.
  Demonstrates all 7 node types.

provider: claude

nodes:
  # ── BASH: Fetch issue from GitHub ──
  - id: fetch-issue
    bash: |
      issue_num=$(echo "$ARGUMENTS" | grep -oE '[0-9]+' | head -1)
      if [ -n "$issue_num" ]; then
        gh issue view "$issue_num" --json title,body,labels
      else
        echo '{"error": "No issue number found in: $ARGUMENTS"}'
        exit 1
      fi
    timeout: 15000

  # ── SCRIPT: Parse labels (TypeScript via bun) ──
  # $fetch-issue.output injected raw — JSON is valid JS, assign directly
  - id: parse-labels
    script: |
      try {
        const issue = $fetch-issue.output;
        const labels = (issue.labels ?? []).map((l) => l.name);
        console.log(JSON.stringify({
          labels,
          count: labels.length,
          hasBug: labels.includes("bug"),
          hasUrgent: labels.includes("urgent")
        }));
      } catch {
        console.log(JSON.stringify({
          labels: [], count: 0, hasBug: false, hasUrgent: false
        }));
      }
    runtime: bun
    depends_on: [fetch-issue]
    timeout: 10000

  # ── PROMPT: Classify (cheap model, no tools, structured output) ──
  - id: classify
    prompt: |
      Classify this GitHub issue:

      $fetch-issue.output

      Determine if this is a bug fix or a new feature.
    depends_on: [fetch-issue]
    model: haiku
    allowed_tools: []
    output_format:
      type: object
      properties:
        issue_type:
          type: string
          enum: [bug, feature]
        title:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
      required: [issue_type, title]

  # ── COMMAND: Investigate (only if bug) ──
  - id: investigate
    command: investigate-bug
    depends_on: [classify]
    when: "$classify.output.issue_type == 'bug'"
    context: fresh

  # ── COMMAND: Plan (only if feature) ──
  - id: plan-feature
    command: plan-feature
    depends_on: [classify]
    when: "$classify.output.issue_type == 'feature'"
    context: fresh

  # ── LOOP: Implement (waits for either path via trigger_rule) ──
  - id: implement
    depends_on: [investigate, plan-feature]
    trigger_rule: one_success
    idle_timeout: 600000
    loop:
      prompt: |
        You are implementing changes for: $classify.output.title

        Read the investigation or plan from $ARTIFACTS_DIR.
        Implement the next piece. Validate with type-check and tests.
        When all changes are complete and validated: <promise>DONE</promise>
      until: DONE
      max_iterations: 5
      fresh_context: false

  # ── CANCEL: Guard clause — no labels found ──
  - id: abort-if-no-labels
    depends_on: [parse-labels]
    when: "$parse-labels.output.count == 0"
    cancel: "No labels found on the issue — cannot determine routing"

  # ── PROMPT: Create PR ──
  - id: create-pr
    prompt: |
      Create a pull request for the changes.

      Issue title: $classify.output.title
      Labels: $parse-labels.output.labels

      Use `gh pr create`. Link to the original issue.
    depends_on: [implement]
    context: fresh
