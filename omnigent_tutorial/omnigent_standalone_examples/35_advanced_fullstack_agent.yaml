# =============================================================================
# Omnigent Standalone Example — Level 8: Full-Stack Agent (Everything)
# =============================================================================
# A MAXIMALLY CONFIGURED agent combining:
#   - External instructions file
#   - Explicit auth configuration
#   - Linux sandbox with restricted paths
#   - Python function tool + MCP server
#   - Sub-agent for code review
#   - Cost budget + tool limit + shell approval policies
#   - Blast radius guardrails
#   - Named terminal sessions
#   - Async work + timers
#
# HOW TO RUN:
#   omni run 35_advanced_fullstack_agent.yaml
#
# WHAT THIS DEMONSTRATES:
#   - All Omnigent features composed into a single agent
#   - This is the "production" template — start here and trim what you don't need
# =============================================================================

name: fullstack_production_agent

# External instructions: keeps the YAML clean and the personality version-controlled
instructions: AGENTS.md

executor:
  harness: claude-sdk
  model: claude-opus-4-8
  auth:
    type: api_key
    api_key: ${ANTHROPIC_API_KEY}

# OS access: sandboxed with explicit write/read paths
os_env:
  type: caller_process
  cwd: .
  sandbox:
    type: linux_bwrap           # Kernel-enforced isolation
    write_paths:
      - ./src
      - ./tests
      - ./output
    read_paths:
      - ./src
      - ./tests
      - ./docs
      - ./data
      - ./pyproject.toml
      - /tmp/omnigent
    allow_network: true
  env:
    PYTHONUNBUFFERED: "1"

# Named terminals for different environments
terminals:
  dev:
    cwd: ./src
    env:
      NODE_ENV: development
  test:
    cwd: ./tests
    env:
      NODE_ENV: test

# Tools: Python function + remote MCP server
tools:
  analyze_code:
    type: function
    description: Run static analysis on a Python file. Returns lint results.
    callable: my_package.tools.analyze_code

  docs_server:
    type: mcp
    url: https://docs.internal.company.com/mcp
    headers:
      Authorization: Bearer ${MCP_AUTH_TOKEN}
    tools: [search_docs, get_page]

  # Sub-agent: Code reviewer (cross-vendor)
  reviewer:
    type: agent
    description: Reviews code for correctness, style, security.
    harness: openai-agents      # DIFFERENT vendor — cross-vendor review
    model: gpt-5
    prompt: |
      You review code. Check: correctness, style, tests, security.
      Report issues with file:line references. Never edit code.
    os_env:
      type: caller_process
      cwd: .
      sandbox: { type: none }

# Policies: cost control + safety + skill restrictions
policies:
  budget:
    type: function
    handler: omnigent.policies.builtins.cost.cost_budget
    factory_params:
      max_cost_usd: 10.00
      ask_thresholds_usd: [5.00]
  rate_limit:
    type: function
    handler: omnigent.policies.builtins.safety.max_tool_calls_per_session
    factory_params:
      limit: 200
  approve_ops:
    type: function
    handler: omnigent.policies.builtins.safety.ask_on_os_tools
  no_destructive:
    type: function
    handler: omnigent.policies.builtins.safety.block_skills
    factory_params:
      blocked: [deploy, destroy, provision]

# Guardrails: always-on runner-level protections
guardrails:
  ask_timeout: 3600
  policies:
    blast_radius:
      type: function
      function:
        path: omnigent.inner.nessie.policies.blast_radius
        arguments:
          gate_pushes: true

# Feature flags
async: true
timers: true
cancellable: true
spawn: true

# User parameters
params:
  verbosity:
    type: string
    enum: [terse, normal, verbose]
    default: normal
  auto_commit:
    type: boolean
    default: false
  preferred_language:
    type: string
    default: python
