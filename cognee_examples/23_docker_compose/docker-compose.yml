# ─────────────────────────────────────────────────────────────────────
# Cognee Production Docker Compose Stack
# ─────────────────────────────────────────────────────────────────────
# Usage:
#   1. Copy .env.example to .env and fill in your API keys
#   2. docker compose up -d
#   3. Verify: curl http://localhost:8000/health
#
# This stack replaces the default dev databases (SQLite + LanceDB + Kuzu)
# with production-grade alternatives for multi-user concurrency.
# ─────────────────────────────────────────────────────────────────────

version: "3.8"

services:
  # ── Cognee API Server ───────────────────────────────────────────────
  cognee-api:
    image: cognee/cognee:latest
    container_name: cognee-api
    ports:
      - "${COGNEE_API_PORT:-8000}:8000"
    environment:
      # LLM Configuration
      - LLM_API_KEY=${LLM_API_KEY:?Required}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      - LLM_API_BASE=${LLM_API_BASE:-}

      # Embedding Configuration
      - EMBEDDING_PROVIDER=${EMBEDDING_PROVIDER:-openai}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}

      # Graph Database (Neo4j for multi-agent concurrency)
      - GRAPH_DB_PROVIDER=neo4j
      - GRAPH_DB_URL=bolt://neo4j:7687
      - GRAPH_DB_USERNAME=${NEO4J_USER:-neo4j}
      - GRAPH_DB_PASSWORD=${NEO4J_PASSWORD:-change-me-in-production}

      # Vector Database (Qdrant for scalable ANN search)
      - VECTOR_DB_PROVIDER=qdrant
      - VECTOR_DB_URL=http://qdrant:6333

      # Relational Database (PostgreSQL for metadata and provenance)
      - RELATIONAL_DB_PROVIDER=postgresql
      - RELATIONAL_DB_URL=postgresql://${POSTGRES_USER:-cognee}:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/${POSTGRES_DB:-cognee}

      # Cache (Redis for subgraph and session caching)
      - CACHE_PROVIDER=redis
      - CACHE_URL=redis://redis:6379
      - CACHE_TTL_SECONDS=${CACHE_TTL:-3600}

      # Pipeline Tuning
      - COGNEE_CONCURRENCY=${COGNEE_CONCURRENCY:-10}
      - COGNEE_DISTRIBUTED=${COGNEE_DISTRIBUTED:-false}

      # Observability (optional)
      - OTEL_EXPORTER_ENDPOINT=${OTEL_EXPORTER_ENDPOINT:-}
      - OTEL_EXPORTER_HEADERS=${OTEL_EXPORTER_HEADERS:-}

      # Security
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - AUTH_PROVIDER=${AUTH_PROVIDER:-api_key}
      - API_KEYS=${API_KEYS:-}

    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - cognee_data:/app/data
    networks:
      - cognee-net

  # ── Neo4j Graph Database ────────────────────────────────────────────
  neo4j:
    image: neo4j:5-enterprise
    container_name: cognee-neo4j
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-change-me-in-production}
      - NEO4J_server_memory_heap_initial__size=${NEO4J_HEAP_INIT:-512m}
      - NEO4J_server_memory_heap_max__size=${NEO4J_HEAP_MAX:-2g}
      - NEO4J_server_memory_pagecache_size=${NEO4J_PAGECACHE:-1g}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-change-me-in-production}", "RETURN 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - cognee-net

  # ── Qdrant Vector Database ──────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cognee-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - cognee-net

  # ── PostgreSQL with pgvector extension ──────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cognee-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-cognee}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me-in-production}
      - POSTGRES_DB=${POSTGRES_DB:-cognee}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-cognee}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cognee-net

  # ── Redis Cache ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cognee-redis
    ports:
      - "6379:6379"
    command: >
      redis-server
      --maxmemory ${REDIS_MAXMEMORY:-2gb}
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cognee-net

volumes:
  cognee_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
  pg_data:
  redis_data:

networks:
  cognee-net:
    driver: bridge
